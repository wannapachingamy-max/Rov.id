<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIEL . MON - ไอดี , ฝากขายไอดี Rov</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Mitr:wght@300;400;600&family=Chakra+Petch:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- 🔴 ปรับโฉมเป็นธีมแดงสมรภูมิ RoV และแอนิเมชัน 🔴 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Mitr', sans-serif;
            background: linear-gradient(135deg, #140507, #2a080c, #3d0c11);
            color: #fcebe3;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        .leaf-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .leaf { position: absolute; top: -50px; width: 20px; height: 20px; background-size: contain; animation: fall linear infinite, sway ease-in-out infinite alternate; opacity: 0.6; }
        /* ปรับเศษเอฟเฟกต์พื้นหลังเป็นสีแดงเพลิงและแดงทอง */
        .leaf:nth-child(even) { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff3344"><path d="M17,8C15.24,5.87 11.29,4 7,4C6.23,4 5.5,4.07 4.79,4.21C4.08,5.08 3.62,6.17 3.5,7.37C3,12.31 6.5,17.29 11.5,18.5C11.5,19.5 12,20 12,20C12,20 12.5,19.5 12.5,18.5C16.89,17.44 20.17,13.78 20.5,9.15C20.5,8.74 20.32,8.34 20,8C19.14,8 18.09,8 17,8Z"/></svg>'); }
        .leaf:nth-child(odd) { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff9900"><path d="M17,8C15.24,5.87 11.29,4 7,4C6.23,4 5.5,4.07 4.79,4.21C4.08,5.08 3.62,6.17 3.5,7.37C3,12.31 6.5,17.29 11.5,18.5C11.5,19.5 12,20 12,20C12,20 12.5,19.5 12.5,18.5C16.89,17.44 20.17,13.78 20.5,9.15C20.5,8.74 20.32,8.34 20,8C19.14,8 18.09,8 17,8Z"/></svg>'); }
        
        @keyframes fall { 0% { top: -50px; } 100% { top: 100vh; } }
        @keyframes sway { 0% { transform: translateX(0) rotate(0deg); } 100% { transform: translateX(50px) rotate(180deg); } }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 2; }
        
        header { 
            text-align: center; 
            margin-bottom: 45px; 
            animation: fadeInDown 1s ease-out; 
        }
        .shop-title { 
            font-family: 'Cinzel', serif; 
            font-size: 2.3rem; 
            font-weight: 700;
            color: #ffffff; 
            text-shadow: 0 0 10px rgba(255, 51, 68, 0.6); /* ออร่าแดงระดับผู้นำ */
            letter-spacing: 6px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }
        header p {
            font-size: 1rem;
            color: #e2c9ca;
            margin-top: 8px;
            letter-spacing: 1px;
            opacity: 0.85;
        }
        
        /* 🔥 ออร่าแสงไฟเรืองแสงสีแดงเพลิงร้อนแรงสำหรับคำว่า Rov 🔥 */
        .glow-rov {
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 8px #ff1a3c, 0 0 15px #ff1a3c, 0 0 25px #ff8800;
            padding: 0 4px;
        }

        header:hover .shop-title { 
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 0 25px rgba(255, 26, 60, 0.9); 
            transform: scale(1.04); 
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ตู้สินค้าโทนดาร์กเรด */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .product-card { 
            background: rgba(42, 8, 12, 0.85); 
            border: 2px solid #631c23; 
            border-radius: 20px; 
            padding: 20px; 
            position: relative; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s, box-shadow 0.3s, opacity 0.3s; 
            backdrop-filter: blur(10px); 
            display: flex; 
            flex-direction: column;
            transform-style: preserve-3d;
            perspective: 1000px;
        }
        
        .product-card:hover { 
            transform: translateY(-12px) rotateX(2deg) rotateY(2deg); 
            border-color: #ff3344; 
            box-shadow: 0 15px 30px rgba(255, 51, 68, 0.25), 0 0 15px rgba(99, 28, 35, 0.5);
        }

        /* ป้ายสถานะ */
        .status-tag { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            padding: 6px 16px; 
            border-radius: 30px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: #fff; 
            z-index: 3; 
            transition: 0.3s;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .product-card:hover .status-tag { transform: translateZ(25px) scale(1.08); }

        .available { background: #00cc44; text-shadow: 0 0 5px #fff; box-shadow: 0 0 15px rgba(0, 204, 68, 0.6), inset 0 0 10px rgba(255,255,255,0.2); }
        .sold { background: #ff1a1a; text-shadow: 0 0 5px #fff; box-shadow: 0 0 15px rgba(255, 26, 26, 0.6), inset 0 0 10px rgba(255,255,255,0.2); }
        .reserved { background: #ff8800; text-shadow: 0 0 5px #fff; box-shadow: 0 0 15px rgba(255, 136, 0, 0.6), inset 0 0 10px rgba(255,255,255,0.2); }
        .installments { background: #0099ff; text-shadow: 0 0 5px #fff; box-shadow: 0 0 15px rgba(0, 153, 255, 0.6), inset 0 0 10px rgba(255,255,255,0.2); }

        .product-card.card-sold { opacity: 0.65; }
        .product-card.card-sold:hover { opacity: 1; }

        .img-box { width: 100%; height: 260px; background: #050102; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #4d1318; transition: 0.3s; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: transform 0.5s ease; }
        .product-card:hover .img-box img { transform: scale(1.06); }
        .product-card:hover .img-box { border-color: #ff3344; }

        .p-id { font-family: 'Chakra Petch', sans-serif; font-size: 1.3rem; color: #fcd9db; margin-bottom: 5px; font-weight: 700; transition: 0.3s; }
        .product-card:hover .p-id { color: #fff; transform: translateZ(15px); }
        
        .p-desc { font-size: 0.9rem; color: #f1d7d8; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: left; min-height: 60px; white-space: pre-line; margin-bottom: 15px; flex-grow: 1; transition: 0.3s; }
        .product-card:hover .p-desc { background: rgba(0, 0, 0, 0.45); color: #fff; }

        /* 🛒 ปุ่มสั่งซื้อดีไซน์สกินแรร์ (แดงทอง) */
        .buy-btn { 
            background: linear-gradient(90deg, #ff3344, #b51220); 
            color: #ffffff; 
            border: 1px solid #ff99a2;
            padding: 11px; 
            border-radius: 10px; 
            font-family: 'Mitr', sans-serif; 
            font-weight: 600; 
            font-size: 0.95rem; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%; 
            margin-top: auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            animation: buttonPulse 2.5s infinite ease-in-out;
        }
        .buy-btn:hover { 
            background: linear-gradient(90deg, #ff6677, #ff3344); 
            box-shadow: 0 0 20px rgba(255, 51, 68, 0.8); 
            transform: scale(1.04);
            animation-play-state: paused;
        }

        @keyframes buttonPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 51, 68, 0.4); }
            50% { transform: scale(1.015); box-shadow: 0 0 10px 4px rgba(255, 51, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 51, 68, 0); }
        }

        /* ปุ่มลบ */
        .del-btn { display: none; position: absolute; top: -10px; right: -10px; width: 30px; height: 30px; background: #ff3333; color: white; border: none; border-radius: 50%; cursor: pointer; font-weight: bold; z-index: 10; transition: 0.2s; }
        .del-btn:hover { transform: scale(1.2) rotate(90deg); background: #cc0000; }

        /* แผงควบคุมแอดมิน */
        .admin-section { margin-top: 60px; text-align: center; }
        .toggle-admin { background: #ff3344; color: #ffffff; padding: 12px 30px; border-radius: 50px; font-weight: 700; border: none; cursor: pointer; font-size: 1rem; transition: 0.3s; box-shadow: 0 4px 10px rgba(255, 51, 68, 0.2); }
        .toggle-admin:hover { background: #ff6677; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 51, 68, 0.5); }
        
        .admin-panel { display: none; background: rgba(30, 5, 8, 0.98); border: 2px dashed #ff3344; border-radius: 20px; padding: 30px; margin-top: 20px; text-align: left; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        
        .admin-panel label { display: block; margin-top: 10px; color: #ff6677; font-size: 0.9rem; }
        .admin-panel input, .admin-panel textarea, .admin-panel select { width: 100%; padding: 10px; margin-top: 5px; background: #0f0204; border: 1px solid #631c23; color: #fff; border-radius: 5px; font-family: 'Mitr', sans-serif; transition: 0.3s; }
        .admin-panel input:focus, .admin-panel textarea:focus, .admin-panel select:focus { border-color: #ff3344; outline: none; box-shadow: 0 0 8px rgba(255, 51, 68, 0.3); }
        .save-btn { background: #ff3344; color: #fff; padding: 12px 20px; border: none; border-radius: 5px; font-weight: bold; margin-top: 20px; cursor: pointer; width: 100%; font-family: 'Mitr', sans-serif; font-size: 1rem; transition: 0.2s; }
        .save-btn:hover { background: #ff6677; box-shadow: 0 0 15px #ff3344; }

        footer { text-align: center; margin-top: 60px; padding: 20px; background: rgba(0,0,0,0.4); border-radius: 20px; }
        .contact-link { color: #ff6677; text-decoration: none; font-weight: 600; margin: 0 10px; transition: 0.2s; display: inline-block; }
        .contact-link:hover { transform: translateY(-2px); color: #fff; text-shadow: 0 0 8px #ff3344; }

        /* กล่องป็อปอัป */
        .magic-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 2, 3, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .magic-modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .magic-modal-card {
            background: linear-gradient(145deg, #260508, #3d0c11);
            border: 2px solid #ff3344;
            border-radius: 20px;
            padding: 30px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 51, 68, 0.3);
            transform: scale(0.7) translateY(30px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .magic-modal-overlay.active .magic-modal-card { transform: scale(1) translateY(0); }

        .magic-modal-title { font-family: 'Cinzel', serif; color: #ff3344; font-size: 1.5rem; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255, 51, 68, 0.5); }
        .magic-modal-text { font-size: 1rem; color: #fcd9db; margin-bottom: 25px; line-height: 1.5; }
        .magic-modal-buttons { display: flex; gap: 12px; justify-content: center; }
        
        .magic-popup-btn { padding: 10px 24px; font-family: 'Mitr', sans-serif; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; min-width: 100px; transition: 0.2s; }
        .magic-btn-confirm { background: #ff3344; color: #fff; }
        .magic-btn-confirm:hover { background: #ff6677; box-shadow: 0 0 15px #ff3344; transform: translateY(-2px); }
        .magic-btn-cancel { background: #421115; color: #f1d7d8; border: 1px solid #631c23; }
        .magic-btn-cancel:hover { background: #631c23; color: #fff; }

        .contact-order-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; text-align: left; }
        .contact-order-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 1rem; color: #fff; transition: 0.3s; transform: scale(1); }
        .order-line { background: #06C755; }
        .order-line:hover { background: #05b04b; box-shadow: 0 0 15px rgba(6, 199, 85, 0.5); transform: scale(1.02) translateY(-2px); }
        .order-fb { background: #1877F2; }
        .order-fb:hover { background: #1464cd; box-shadow: 0 0 15px rgba(24, 119, 242, 0.5); transform: scale(1.02) translateY(-2px); }
    </style>
</head>
<body>

    <div class="leaf-container" id="leafContainer"></div>

    <div class="container">
        <header>
            <h1 class="shop-title">CHIEL . MON</h1>
            <p>ไอดี , ฝากขายไอดี <span class="glow-rov">Rov</span></p>
        </header>

        <!-- โซนตู้สินค้า -->
        <div class="product-grid" id="mainGrid"></div>

        <!-- แผงควบคุมแอดมินด้านล่าง -->
        <div class="admin-section">
            <button class="toggle-admin" onclick="showAdmin()">✨ จัดการตู้สินค้า (เพิ่ม/ลบ)</button>
            
            <div class="admin-panel" id="adminBox" style="display: none;">
                <h3>🛠️ เพิ่มสินค้าใหม่ (รองรับภาพขนาดใหญ่พิเศษ)</h3>
                <label>รูปภาพไอดี:</label>
                <input type="file" id="pImg" accept="image/*">
                
                <label>รหัสไอดี (ID):</label>
                <input type="text" id="pId" placeholder="เช่น ID-001">
                
                <label>สถานะสินค้า:</label>
                <select id="pStatus">
                    <option value="available">ยังอยู่</option>
                    <option value="sold">ขายหมดแล้ว</option>
                    <option value="reserved">ติดจอง</option>
                    <option value="installments">ติดผ่อน</option>
                </select>
                
                <label>รายละเอียดสินค้า:</label>
                <textarea id="pDesc" rows="3" placeholder="ระบุรายละเอียดไอดี..."></textarea>
                
                <button class="save-btn" onclick="addNew()">➕ บันทึกภาพความละเอียดสูงลงตู้สินค้า</button>
            </div>
        </div>

        <footer>
            <p>✦ Contact ✦</p>
            <a href="https://www.facebook.com/share/1CTGfbxK8g/" class="contact-link" target="_blank">Facebook</a>
            <a href="https://lin.ee/7pt6TZl" class="contact-link" target="_blank">Line Official</a>
        </footer>
    </div>

    <!-- กล่องป็อปอัปเวทมนตร์ -->
    <div class="magic-modal-overlay" id="magicModal">
        <div class="magic-modal-card">
            <div class="magic-modal-title" id="modalTitle">CHIEL . MON</div>
            <div class="magic-modal-text" id="modalText">ข้อความระบบ...</div>
            <div id="customModalContent"></div>
            <div class="magic-modal-buttons" id="modalButtons"></div>
        </div>
    </div>

    <script>
        // สร้างใบไม้ร่วงและส่ายพื้นหลัง
        const leafContainer = document.getElementById('leafContainer');
        if (leafContainer) {
            for (let i = 0; i < 15; i++) {
                const l = document.createElement('div');
                l.className = 'leaf';
                l.style.left = Math.random() * 100 + '%';
                l.style.animationDuration = (Math.random() * 5 + 6) + 's, ' + (Math.random() * 2 + 3) + 's';
                l.style.animationDelay = Math.random() * 5 + 's, ' + Math.random() * 2 + 's';
                leafContainer.appendChild(l);
            }
        }

        // --- ระบบจัดการกล่องป็อปอัปแบบปรับแต่งเอง ---
        function clearModalExtensions() {
            document.getElementById('customModalContent').innerHTML = '';
        }

        function openMagicAlert(title, text, onConfirm) {
            clearModalExtensions();
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            const btnContainer = document.getElementById('modalButtons');
            btnContainer.innerHTML = `<button class="magic-popup-btn magic-btn-confirm" id="popupOkBtn">ตกลง</button>`;
            
            const overlay = document.getElementById('magicModal');
            overlay.classList.add('active');
            
            document.getElementById('popupOkBtn').onclick = function() {
                overlay.classList.remove('active');
                if(onConfirm) onConfirm();
            };
        }

        function openMagicConfirm(title, text, onConfirm, onCancel) {
            clearModalExtensions();
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            const btnContainer = document.getElementById('modalButtons');
            btnContainer.innerHTML = `
                <button class="magic-popup-btn magic-btn-cancel" id="popupCancelBtn">ยกเลิก</button>
                <button class="magic-popup-btn magic-btn-confirm" id="popupConfirmBtn">ตกลง</button>
            `;
            
            const overlay = document.getElementById('magicModal');
            overlay.classList.add('active');
            
            document.getElementById('popupConfirmBtn').onclick = function() {
                overlay.classList.remove('active');
                if(onConfirm) onConfirm();
            };
            document.getElementById('popupCancelBtn').onclick = function() {
                overlay.classList.remove('active');
                if(onCancel) onCancel();
            };
        }

        function openOrderModal(productId) {
            clearModalExtensions();
            document.getElementById('modalTitle').innerText = "🔮 ช่องทางติดต่อสั่งซื้อ";
            document.getElementById('modalText').innerText = `คุณกำลังสนใจสั่งซื้อไอดีรหัส: ${productId}\nกรุณาเลือกช่องทางที่คุณสะดวกเพื่อทักแชทแอดมินได้เลยครับ`;
            
            document.getElementById('customModalContent').innerHTML = `
                <div class="contact-order-box">
                    <a href="https://lin.ee/7pt6TZl" target="_blank" class="contact-order-btn order-line">
                        🟢 สั่งซื้อผ่าน Line Official
                    </a>
                    <a href="https://www.facebook.com/share/1CTGfbxK8g/" target="_blank" class="contact-order-btn order-fb">
                        🔵 สั่งซื้อผ่าน Facebook
                    </a>
                </div>
            `;

            const btnContainer = document.getElementById('modalButtons');
            btnContainer.innerHTML = `<button class="magic-popup-btn magic-btn-cancel" id="popupCloseBtn" style="width:100%">ปิดหน้าต่างนี้</button>`;
            
            const overlay = document.getElementById('magicModal');
            overlay.classList.add('active');
            
            document.getElementById('popupCloseBtn').onclick = function() {
                overlay.classList.remove('active');
            };
        }

        // --- ระบบฐานข้อมูล INDEXEDDB SYSTEM ---
        const dbName = "ChielMonMegaDB";
        const storeName = "products";
        let db;

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName, { keyPath: "id", autoIncrement: true });
            }
        };
        request.onsuccess = function(e) {
            db = e.target.result;
            render();
        };

        function showAdmin() {
            const box = document.getElementById('adminBox');
            const btns = document.querySelectorAll('.del-btn');
            const isBlock = box.style.display === 'block';
            box.style.display = isBlock ? 'none' : 'block';
            btns.forEach(b => b.style.display = isBlock ? 'none' : 'block');
            if(!isBlock) box.scrollIntoView({ behavior: 'smooth' });
        }

        function addNew() {
            const idCode = document.getElementById('pId').value.trim();
            const status = document.getElementById('pStatus').value;
            const desc = document.getElementById('pDesc').value.trim();
            const fileInput = document.getElementById('pImg');
            const file = fileInput.files[0];

            if(!idCode || !desc || !file) {
                openMagicAlert("✦ แจ้งเตือน ✦", "กรุณากรอกข้อมูลให้ครบถ้วนและเลือกรูปภาพด้วยนะครับ");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const maxW = 1200;
                    const scale = maxW / img.width;
                    if(img.width > maxW) {
                        canvas.width = maxW;
                        canvas.height = img.height * scale;
                    } else {
                        canvas.width = img.width;
                        canvas.height = img.height;
                    }

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const optimizedImage = canvas.toDataURL('image/jpeg', 0.85);

                    const newItem = {
                        productId: idCode,
                        status: status,
                        desc: desc,
                        img: optimizedImage
                    };

                    const transaction = db.transaction([storeName], "readwrite");
                    const store = transaction.objectStore(storeName);
                    const addRequest = store.add(newItem);

                    addRequest.onsuccess = function() {
                        document.getElementById('pId').value = '';
                        document.getElementById('pDesc').value = '';
                        fileInput.value = '';
                        render();
                        openMagicAlert("✦ สำเร็จ ✦", "เพิ่มสินค้าเข้าสู่ตู้แสดงผลเรียบร้อยแล้ว! ✨");
                    };
                };
            };
            reader.readAsDataURL(file);
        }

        function render() {
            const grid = document.getElementById('mainGrid');
            if (!grid || !db) return;
            grid.innerHTML = '';

            const transaction = db.transaction([storeName], "readonly");
            const store = transaction.objectStore(storeName);
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = function() {
                const list = getAllRequest.result;
                const box = document.getElementById('adminBox');
                const isEditing = box ? (box.style.display === 'block') : false;

                if (list.length === 0) {
                    grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #e2c9ca; font-style: italic; padding: 40px 0;">✦ ขณะนี้ยังไม่มีรายการไอดีในตู้สินค้า ✦</p>`;
                    return;
                }

                const statusLabel = {
                    'available': 'ยังอยู่',
                    'sold': 'ขายหมดแล้ว',
                    'reserved': 'ติดจอง',
                    'installments': 'ติดผ่อน'
                };

                list.forEach((item) => {
                    const card = document.createElement('div');
                    card.className = `product-card ${item.status === 'sold' ? 'card-sold' : ''}`;
                    card.innerHTML = `
                        <button class="del-btn" style="display:${isEditing?'block':'none'}" onclick="remove(${item.id})">✕</button>
                        <div class="status-tag ${item.status}">${statusLabel[item.status]}</div>
                        <div class="img-box"><img src="${item.img}" onclick="window.open('${item.img}', '_blank')"></div>
                        <div class="p-id">${item.productId}</div>
                        <div class="p-desc">${item.desc}</div>
                        <button class="buy-btn" onclick="openOrderModal('${item.productId}')">🛍️ สนใจสั่งซื้อไอดีนี้</button>
                    `;
                    grid.appendChild(card);
                });
            };
        }

        function remove(id) {
            openMagicConfirm("✦ ยืนยันการลบ ✦", "คุณต้องการลบสินค้าชิ้นนี้ออกจากตู้ใช่หรือไม่?", function() {
                const transaction = db.transaction([storeName], "readwrite");
                const store = transaction.objectStore(storeName);
                const deleteRequest = store.delete(id);
                deleteRequest.onsuccess = function() {
                    render();
                };
            });
        }
    </script>
</body>
</html>
